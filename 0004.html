<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 曼子爱心特效 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e, #ffb6c1);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }
        
        .manzi-heart {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s, background 0.3s;
            user-select: none;
        }
        
        .manzi-heart:hover {
            transform: scale(1.2);
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }
        
        .btn-create {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        }
        
        .btn-animate {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #00b894, #00cec9);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .info {
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .love-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }
        
        .float {
            animation: float 2s ease-in-out infinite;
        }
        
        .rotate {
            animation: rotate 3s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❤️ 曼子爱心特效 ❤️</h1>
        
        <div class="heart-container" id="heartContainer">
            <!-- 曼子爱心会在这里生成 -->
        </div>
        
        <div class="controls">
            <button class="btn btn-create" onclick="createHeart()">生成爱心</button>
            <button class="btn btn-animate" onclick="animateHeart()">播放动画</button>
            <button class="btn btn-clear" onclick="clearHeart()">清空爱心</button>
        </div>
        
        <div class="info">
            点击"生成爱心"创建曼子爱心，点击曼子会有惊喜哦！
        </div>
    </div>

    <script>
        // 曼子表情数组
        const manziEmojis = ['🐱', '😺', '😸', '😹', '😻', '😼', '😽', '🙀'];
        const specialEmojis = ['❤️', '💕', '💖', '💗', '💓', '💘'];
        
        // 爱心形状坐标点
        function getHeartPoints(count = 60) {
            const points = [];
            const centerX = 150;
            const centerY = 150;
            const size = 100;
            
            for (let i = 0; i < count; i++) {
                const t = (i / count) * 2 * Math.PI;
                
                // 爱心参数方程
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                // 缩放和平移
                const px = centerX + x * (size / 16);
                const py = centerY + y * (size / 16);
                
                points.push({x: px, y: py});
            }
            
            return points;
        }
        
        // 创建爱心
        function createHeart() {
            const container = document.getElementById('heartContainer');
            container.innerHTML = '';
            
            const points = getHeartPoints(60);
            const manzis = [];
            
            points.forEach((point, index) => {
                const manzi = document.createElement('div');
                manzi.className = 'manzi-heart';
                
                // 随机选择表情
                const isSpecial = index % 10 === 0; // 每10个有一个特殊表情
                const emoji = isSpecial ? 
                    specialEmojis[Math.floor(Math.random() * specialEmojis.length)] : 
                    manziEmojis[Math.floor(Math.random() * manziEmojis.length)];
                
                manzi.textContent = emoji;
                manzi.style.left = `${point.x}px`;
                manzi.style.top = `${point.y}px`;
                
                // 添加点击事件
                manzi.addEventListener('click', () => {
                    handleManziClick(manzi, point.x, point.y);
                });
                
                // 添加触摸事件
                manzi.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleManziClick(manzi, point.x, point.y);
                });
                
                // 随机延迟出现
                manzi.style.opacity = '0';
                manzi.style.transform = 'scale(0)';
                
                setTimeout(() => {
                    manzi.style.transition = 'opacity 0.5s, transform 0.5s';
                    manzi.style.opacity = '1';
                    manzi.style.transform = 'scale(1)';
                }, index * 20);
                
                container.appendChild(manzi);
                manzis.push(manzi);
            });
            
            // 添加爱心文字
            const loveText = document.createElement('div');
            loveText.className = 'love-text';
            loveText.textContent = '';
            container.appendChild(loveText);
            
            // 保存到全局变量
            window.currentHeart = manzis;
        }
        
        // 处理曼子点击
        function handleManziClick(manzi, x, y) {
            // 改变颜色
            manzi.style.background = 'linear-gradient(135deg, #ff6b6b, #ffd93d)';
            
            // 添加漂浮动画
            manzi.style.animation = 'float 1s ease-out';
            
            // 创建粒子效果
            createParticles(x, y);
            
            // 恢复原状
            setTimeout(() => {
                manzi.style.background = 'linear-gradient(135deg, #ff9a9e, #fad0c4)';
                manzi.style.animation = '';
            }, 1000);
        }
        
        // 创建粒子效果
        function createParticles(x, y) {
            const container = document.getElementById('heartContainer');
            
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'manzi-heart';
                particle.textContent = '❤️';
                particle.style.position = 'absolute';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.fontSize = '12px';
                particle.style.zIndex = '100';
                
                // 随机方向
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.transition = 'all 1s ease-out';
                particle.style.opacity = '1';
                
                container.appendChild(particle);
                
                // 触发动画
                setTimeout(() => {
                    particle.style.left = `${x + tx}px`;
                    particle.style.top = `${y + ty}px`;
                    particle.style.opacity = '0';
                    particle.style.transform = 'scale(0)';
                }, 10);
                
                // 移除粒子
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.remove();
                    }
                }, 1100);
            }
        }
        
        // 播放动画
        function animateHeart() {
            if (!window.currentHeart || window.currentHeart.length === 0) {
                alert('请先生成爱心！');
                return;
            }
            
            // 心跳动画
            document.querySelector('.love-text').classList.add('pulse');
            
            // 每个曼子的动画
            window.currentHeart.forEach((manzi, index) => {
                setTimeout(() => {
                    manzi.classList.add('float');
                    
                    // 随机颜色变化
                    setTimeout(() => {
                        manzi.style.background = 'linear-gradient(135deg, #6c5ce7, #a29bfe)';
                        
                        setTimeout(() => {
                            manzi.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
                            
                            setTimeout(() => {
                                manzi.style.background = 'linear-gradient(135deg, #ff9a9e, #fad0c4)';
                                manzi.classList.remove('float');
                            }, 500);
                        }, 500);
                    }, 500);
                    
                }, index * 30);
            });
            
            // 整个爱心旋转
            const container = document.getElementById('heartContainer');
            container.style.transition = 'transform 3s ease-in-out';
            container.style.transform = 'rotate(360deg)';
            
            setTimeout(() => {
                container.style.transform = 'rotate(0deg)';
                document.querySelector('.love-text').classList.remove('pulse');
            }, 3000);
        }
        
        // 清空爱心
        function clearHeart() {
            const container = document.getElementById('heartContainer');
            const manzis = container.querySelectorAll('.manzi-heart');
            
            // 渐隐消失
            manzis.forEach((manzi, index) => {
                setTimeout(() => {
                    manzi.style.transition = 'opacity 0.5s, transform 0.5s';
                    manzi.style.opacity = '0';
                    manzi.style.transform = 'scale(0)';
                    
                    // 移除元素
                    setTimeout(() => {
                        if (manzi.parentNode) {
                            manzi.remove();
                        }
                    }, 500);
                }, index * 10);
            });
            
            // 移除文字
            const loveText = document.querySelector('.love-text');
            if (loveText) {
                loveText.remove();
            }
            
            window.currentHeart = [];
        }
        
        // 页面加载时自动生成爱心
        window.addEventListener('load', () => {
            setTimeout(() => {
                createHeart();
            }, 500);
        });
    </script>
</body>
</html>
