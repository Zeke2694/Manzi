<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 曼子冒险记 - 终极修复版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #ffcce6 0%, #ff99cc 50%, #ff66b2 100%);
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #5c2d91;
        }

        .game-container {
            width: 900px;
            max-width: 95vw;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .header {
            width: 100%;
            background: linear-gradient(90deg, #e6b3ff, #cc99ff);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            background: white;
            border-radius: 10px;
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            min-width: 80px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ff66b2;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .game-canvas {
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom, #a6d1ff, #66b3ff);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-start {
            background: linear-gradient(90deg, #ff66b2, #ff99cc);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(90deg, #ffcc00, #ffdd33);
            color: #333;
        }

        .btn-restart {
            background: linear-gradient(90deg, #9966ff, #cc99ff);
            color: white;
        }

        .instructions {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
        }

        .game-over-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            transition: transform 0.3s ease;
            width: 80%;
            max-width: 300px;
        }

        .game-over-modal.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .game-over-title {
            font-size: 24px;
            color: #ff66b2;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 20px;
            margin-bottom: 20px;
            color: #666;
        }

        .restart-btn {
            background: linear-gradient(90deg, #ff66b2, #ff99cc);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">
                <span>🐱</span>
                <span>曼子冒险记</span>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">糖果数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="highScore">0</div>
                    <div class="stat-label">最高记录</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="speed">1.0x</div>
                    <div class="stat-label">冒险速度</div>
                </div>
            </div>
        </div>

        <div class="game-canvas">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">
                <span>🚀</span> 开始冒险
            </button>
            <button class="btn btn-pause" id="pauseBtn">
                <span>⏸</span> 暂停休息
            </button>
            <button class="btn btn-restart" id="restartBtn">
                <span>🔄</span> 重新开始
            </button>
        </div>

        <div class="instructions">
            🎮 空格键/点击跳跃 | 🍬 收集糖果 | ⚡ 躲避障碍 | 💯 挑战最高分!
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-title">游戏结束!</div>
        <div class="final-score">你收集了 <span id="finalScore">0</span> 颗糖果</div>
        <button class="restart-btn" onclick="startGame()">再玩一次</button>
    </div>

    <script>
        // 游戏核心代码
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverModal = document.getElementById('gameOverModal');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const speedElement = document.getElementById('speed');
        const finalScoreElement = document.getElementById('finalScore');

        // 设置画布尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 游戏状态
        let gameState = 'ready'; // ready, playing, paused, ended
        let score = 0;
        let highScore = localStorage.getItem('manziHighScore') || 0;
        let gameSpeed = 1.0;
        let combo = 0;
        let frameCount = 0;
        let isNewRecord = false;
        let animationFrameId = null;

        // 物理参数
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const GROUND_HEIGHT = 60;

        // 玩家对象
        const player = {
            x: 100,
            y: canvas.height - GROUND_HEIGHT - 40,
            width: 40,
            height: 40,
            velocityY: 0,
            jumping: false,
            color: '#ff66b2',
            trail: [],
            
            jump() {
                if (!this.jumping) {
                    this.velocityY = JUMP_FORCE;
                    this.jumping = true;
                    createJumpEffect(this.x + this.width/2, this.y + this.height);
                }
            },
            
            update() {
                this.velocityY += GRAVITY;
                this.y += this.velocityY;
                
                // 地面碰撞
                if (this.y + this.height >= canvas.height - GROUND_HEIGHT) {
                    this.y = canvas.height - GROUND_HEIGHT - this.height;
                    this.velocityY = 0;
                    this.jumping = false;
                }
                
                // 更新轨迹
                this.trail.push({x: this.x + this.width/2, y: this.y + this.height/2});
                if (this.trail.length > 5) this.trail.shift();
            },
            
            draw() {
                // 绘制轨迹
                this.trail.forEach((point, index) => {
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 102, 178, ${0.3 - index/this.trail.length * 0.3})`;
                    ctx.fill();
                });
                
                // 绘制曼子
                ctx.save();
                
                // 发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                
                // 身体
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 表情
                ctx.fillStyle = 'white';
                ctx.font = `${this.width/2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🐱', this.x + this.width/2, this.y + this.height/2);
                
                ctx.restore();
            }
        };

        // 障碍物数组
        let obstacles = [];
        let particles = [];

        // 障碍物类型
        const obstacleTypes = [
            { name: '蘑菇', width: 40, height: 60, color: '#ff6666' },
            { name: '灌木', width: 60, height: 40, color: '#66cc66' },
            { name: '石头', width: 50, height: 35, color: '#999999' }
        ];

        // 粒子系统
        function createJumpEffect(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 2,
                    size: Math.random() * 3 + 2,
                    life: 1.0,
                    decay: 0.02,
                    color: '#ffcc00'
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        // 生成障碍物
        function spawnObstacle() {
            if (gameState !== 'playing') return;
            
            // 确保障碍物间隔
            if (obstacles.length > 0) {
                const lastObs = obstacles[obstacles.length - 1];
                if (lastObs.x > canvas.width - 300) {
                    return;
                }
            }
            
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            
            const obstacle = {
                x: canvas.width,
                y: canvas.height - GROUND_HEIGHT - type.height,
                width: type.width,
                height: type.height,
                color: type.color,
                name: type.name,
                passed: false
            };
            
            obstacles.push(obstacle);
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // 绘制地面
        function drawGround() {
            // 草地
            const gradient = ctx.createLinearGradient(0, canvas.height - GROUND_HEIGHT, 0, canvas.height);
            gradient.addColorStop(0, '#66cc99');
            gradient.addColorStop(1, '#33aa66');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            
            // 花朵
            ctx.fillStyle = '#ff4da6';
            for (let i = 0; i < canvas.width; i += 40) {
                const x = (i + frameCount * 0.5) % canvas.width;
                drawFlower(x, canvas.height - GROUND_HEIGHT - 5);
            }
        }

        function drawFlower(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // 花瓣
            for (let i = 0; i < 8; i++) {
                ctx.save();
                ctx.rotate(i * Math.PI / 4);
                ctx.fillStyle = '#ff4da6';
                ctx.beginPath();
                ctx.ellipse(0, 8, 3, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            // 花心
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // 绘制背景
        function drawBackground() {
            // 天空
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height - GROUND_HEIGHT);
            gradient.addColorStop(0, '#b3e6ff');
            gradient.addColorStop(1, '#80d4ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height - GROUND_HEIGHT);
            
            // 云朵
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            for (let i = 0; i < 3; i++) {
                const x = (i * 300 + frameCount * 0.2) % (canvas.width + 300) - 100;
                const y = 50 + i * 40;
                
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.arc(x + 15, y - 10, 25, 0, Math.PI * 2);
                ctx.arc(x + 35, y, 20, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 更新UI
        function updateUI() {
            scoreElement.textContent = Math.floor(score);
            highScoreElement.textContent = Math.floor(highScore);
            speedElement.textContent = gameSpeed.toFixed(1) + 'x';
        }

        // 游戏结束
        function gameOver() {
            gameState = 'ended';
            cancelAnimationFrame(animationFrameId);
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('manziHighScore', highScore);
                isNewRecord = true;
            }
            
            // 显示弹窗
            finalScoreElement.textContent = Math.floor(score);
            gameOverModal.classList.add('show');
        }

        // 游戏主循环
        function gameLoop() {
            if (gameState !== 'playing') return;
            
            frameCount++;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawBackground();
            
            // 绘制地面
            drawGround();
            
            // 更新玩家
            player.update();
            player.draw();
            
            // 更新和绘制障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= 4 * gameSpeed;
                
                // 绘制障碍物
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                // 描边
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                
                // 碰撞检测
                if (checkCollision(player, obs)) {
                    gameOver();
                    return;
                }
                
                // 计分
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    updateUI();
                    
                    // 动态难度
                    if (score > 0 && score % 50 === 0) {
                        gameSpeed = Math.min(gameSpeed + 0.2, 3.0);
                        updateUI();
                    }
                }
                
                // 移除屏幕外的障碍物
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }
            
            // 更新和绘制粒子
            updateParticles();
            drawParticles();
            
            // 生成障碍物
            if (frameCount % 60 === 0) {
                spawnObstacle();
            }
            
            // 继续游戏循环
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameState === 'ended') {
                resetGame();
            }
            
            gameState = 'playing';
            gameOverModal.classList.remove('show');
            
            // 重置游戏状态
            score = 0;
            gameSpeed = 1.0;
            frameCount = 0;
            obstacles = [];
            particles = [];
            
            player.y = canvas.height - GROUND_HEIGHT - 40;
            player.velocityY = 0;
            player.jumping = false;
            player.trail = [];
            
            updateUI();
            gameLoop();
        }

        // 暂停游戏
        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                cancelAnimationFrame(animationFrameId);
                pauseBtn.innerHTML = '<span>▶️</span> 继续';
            } else if (gameState === 'paused') {
                gameState = 'playing';
                pauseBtn.innerHTML = '<span>⏸</span> 暂停';
                gameLoop();
            }
        }

        // 重新开始游戏
        function resetGame() {
            gameState = 'ready';
            gameOverModal.classList.remove('show');
            
            // 重置所有状态
            score = 0;
            gameSpeed = 1.0;
            frameCount = 0;
            obstacles = [];
            particles = [];
            
            player.y = canvas.height - GROUND_HEIGHT - 40;
            player.velocityY = 0;
            player.jumping = false;
            player.trail = [];
            
            updateUI();
            
            // 绘制初始画面
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawGround();
            player.draw();
        }

        // 事件监听
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', resetGame);

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    player.jump();
                } else if (gameState === 'ready' || gameState === 'ended') {
                    startGame();
                }
            }
        });

        // 点击控制
        canvas.addEventListener('click', () => {
            if (gameState === 'playing') {
                player.jump();
            } else if (gameState === 'ready' || gameState === 'ended') {
                startGame();
            }
        });

        // 初始化
        updateUI();
        drawBackground();
        drawGround();
        player.draw();
    </script>
</body>
</html>
